name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Configure 32-bit
        run: cmake -B build32 -G "Visual Studio 17 2022" -A Win32

      - name: Build 32-bit plugin
        run: cmake --build build32 --config Release --target BuzzBridge

      - name: Build 32-bit bridge host
        run: cmake --build build32 --config Release --target BuzzBridgeHost32

      - name: Build and run tests
        run: |
          cmake --build build32 --config Release --target BuzzBridgeTests
          ctest --test-dir build32 -C Release --output-on-failure

      - name: Build machine test suite
        run: cmake --build build32 --config Release --target BuzzMachineTests

      - name: Extract machine database
        run: Expand-Archive -Path data/mdb_machines.zip -DestinationPath gear -Force

      - name: Generate machine-support_windows.txt
        shell: bash
        run: |
          # Best-effort: the sweep loads every real machine DLL in a child
          # process and exits non-zero when any machine fails (many are
          # control-only/silent by nature), so don't let that fail the build.
          GEAR_WIN=$(cygpath -w "$PWD/gear")
          build32/bin/Release/BuzzMachineTests.exe "$GEAR_WIN" > machine-tests-out.txt || true
          sed -n '/Found [0-9]* machines total/,$p' machine-tests-out.txt > machine-support_windows.txt
          cat machine-support_windows.txt

      - name: Upload machine-support_windows.txt
        uses: actions/upload-artifact@v4
        with:
          name: BuzzBridge-Machine-Support-Windows
          path: machine-support_windows.txt
          if-no-files-found: warn

      - name: Configure 64-bit
        run: cmake -B build64 -G "Visual Studio 17 2022" -A x64

      - name: Build 64-bit plugin
        run: cmake --build build64 --config Release --target BuzzBridge

      - name: Assemble VST3 bundle
        run: |
          mkdir -p dist/BuzzBridge.vst3/Contents/x86-win
          mkdir -p dist/BuzzBridge.vst3/Contents/x86_64-win
          mkdir -p dist/BuzzBridge.vst3/Contents/Resources
          cp build32/VST3/Release/BuzzBridge.vst3/Contents/x86-win/BuzzBridge.vst3 dist/BuzzBridge.vst3/Contents/x86-win/
          cp build64/VST3/Release/BuzzBridge.vst3/Contents/x86_64-win/BuzzBridge.vst3 dist/BuzzBridge.vst3/Contents/x86_64-win/
          cp build32/bin/Release/BuzzBridgeHost32.exe dist/BuzzBridge.vst3/Contents/x86_64-win/
          cp build64/VST3/Release/BuzzBridge.vst3/Contents/Resources/moduleinfo.json dist/BuzzBridge.vst3/Contents/Resources/
        shell: bash

      # --- Windows code signing (Azure Trusted Signing) --------------------
      # Signing is MANDATORY: refuse to publish an unsigned release. The inner
      # binaries are signed BEFORE the installer wraps them, then the installer
      # itself is signed after it is built. See docs/code-signing.md.
      - name: Require Windows signing config
        shell: bash
        env:
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          if [ -z "$AZURE_CLIENT_SECRET" ]; then
            echo "::error::Azure Trusted Signing secrets not set — refusing to publish an UNSIGNED Windows release. Configure the Windows signing secrets (see docs/code-signing.md)."
            exit 1
          fi

      - name: Sign Windows binaries (Azure Trusted Signing)
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZ_TS_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZ_TS_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZ_TS_PROFILE }}
          # dist currently holds only the assembled bundle (no installer yet):
          # the two inner BuzzBridge.vst3 PEs plus BuzzBridgeHost32.exe.
          files-folder: dist
          files-folder-filter: vst3,exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify Windows binary signatures
        shell: pwsh
        run: |
          $files = @(
            "dist/BuzzBridge.vst3/Contents/x86-win/BuzzBridge.vst3",
            "dist/BuzzBridge.vst3/Contents/x86_64-win/BuzzBridge.vst3",
            "dist/BuzzBridge.vst3/Contents/x86_64-win/BuzzBridgeHost32.exe"
          )
          foreach ($f in $files) {
            $sig = Get-AuthenticodeSignature $f
            if ($sig.Status -ne 'Valid') {
              Write-Error "Authenticode signature on $f is not Valid (status: $($sig.Status)) — refusing to publish."
              exit 1
            }
            Write-Host "OK: $f signed by $($sig.SignerCertificate.Subject)"
          }

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ github.ref_name }} installer\BuzzBridge.iss

      - name: Sign Windows installer (Azure Trusted Signing)
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZ_TS_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZ_TS_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZ_TS_PROFILE }}
          # Top-level dist only (recurse: false) so this matches just the
          # installer exe, not the already-signed BuzzBridgeHost32.exe nested
          # in the bundle.
          files-folder: dist
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify Windows installer signature
        shell: pwsh
        run: |
          $exe = "dist/BuzzBridge-Setup-${{ github.ref_name }}.exe"
          $sig = Get-AuthenticodeSignature $exe
          if ($sig.Status -ne 'Valid') {
            Write-Error "Authenticode signature on $exe is not Valid (status: $($sig.Status)) — refusing to publish."
            exit 1
          }
          Write-Host "OK: $exe signed by $($sig.SignerCertificate.Subject)"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: BuzzBridge-Windows-Installer
          path: dist/BuzzBridge-Setup-${{ github.ref_name }}.exe
          if-no-files-found: error

      - name: Upload machine database
        uses: actions/upload-artifact@v4
        with:
          name: BuzzBridge-Machine-Database
          path: data/mdb_machines.zip
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build curl tar xz-utils

      - name: Cache llvm-mingw toolchain
        uses: actions/cache@v4
        with:
          path: third_party/llvm-mingw
          key: llvm-mingw-20250709-ubuntu-22.04

      - name: Install WINE (32-bit) for tests
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine wine32:i386 xvfb

      - name: Cross-build BuzzBridge for WINE
        run: ./scripts/build-linux-wine.sh

      - name: Generate machine-support_linux.txt
        env:
          WINEDEBUG: -all
        run: |
          # Best-effort sweep (see Windows note); reuses the configured
          # build-wine tree and the bundled machine database under WINE.
          xvfb-run -a ./scripts/run_machine_tests_linux.sh || true

      - name: Upload machine-support_linux.txt
        uses: actions/upload-artifact@v4
        with:
          name: BuzzBridge-Machine-Support-Linux
          path: machine-support_linux.txt
          if-no-files-found: warn

      - name: Package Linux tarball
        run: ./scripts/package-linux.sh "${{ github.ref_name }}"

      - name: Upload Linux tarball
        uses: actions/upload-artifact@v4
        with:
          name: BuzzBridge-Linux-Tarball
          path: dist-wine/BuzzBridge-Linux-${{ github.ref_name }}.tar.gz
          if-no-files-found: error

  publish-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: BuzzBridge-Windows-Installer
          path: release-artifacts

      - name: Download Linux tarball
        uses: actions/download-artifact@v4
        with:
          name: BuzzBridge-Linux-Tarball
          path: release-artifacts

      - name: Download machine database
        uses: actions/download-artifact@v4
        with:
          name: BuzzBridge-Machine-Database
          path: release-artifacts

      - name: Download Windows machine-support report
        uses: actions/download-artifact@v4
        with:
          name: BuzzBridge-Machine-Support-Windows
          path: release-artifacts
        continue-on-error: true

      - name: Download Linux machine-support report
        uses: actions/download-artifact@v4
        with:
          name: BuzzBridge-Machine-Support-Linux
          path: release-artifacts
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/BuzzBridge-Setup-${{ github.ref_name }}.exe
            release-artifacts/BuzzBridge-Linux-${{ github.ref_name }}.tar.gz
            release-artifacts/mdb_machines.zip
            release-artifacts/machine-support_windows.txt
            release-artifacts/machine-support_linux.txt
          generate_release_notes: true
          fail_on_unmatched_files: false
